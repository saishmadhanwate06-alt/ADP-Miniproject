<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Our Menu 🍦</h1>
<!-- NAV BUTTONS -->
<div class="nav-buttons">
    
    <button onclick="goBack()">⬅ Back</button>
</div>




<div class="menu">

    <div class="item">
        <img src="images/cakes.jpg">
        <h3>Chocolate Cake</h3>
        <p>₹250</p>
        <button onclick="addToCart('Chocolate Cake',250)">Add to Cart</button>
    </div>

    <div class="item">
        <img src="images/pastries.jpg">
        <h3>Pastry</h3>
        <p>₹150</p>
        <button onclick="addToCart('Pastry',150)">Add to Cart</button>
    </div>

    <div class="item">
        <img src="images/brownies.jpg">
        <h3>Brownie</h3>
        <p>₹100</p>
        <button onclick="addToCart('Brownie',100)">Add to Cart</button>
    </div>

    <div class="item">
        <img src="images/ChocolateCupcake.jpg">
        <h3>Chocolate Cupcake</h3>
        <p>₹120</p>
        <button onclick="addToCart('Cupcake',120)">Add to Cart</button>
    </div>

    <div class="item">
        <img src="images/donut.jpg">
        <h3>Donut</h3>
        <p>₹200</p>
        <button onclick="addToCart('Donut',200)">Add to Cart</button>
    </div>

</div>

<<!-- BACK BUTTON SCRIPT -->
<script>
function goBack(){
    if(document.referrer !== ""){
        window.history.back();
    } else {
        window.location.href = "index.html";
    }
}
</script>

<script src="script.js"></script>

</body>
</html>
